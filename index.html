
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic UGC Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Archivo+Black&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        body {
            font-family: 'Lexend', sans-serif;
            background: #f0f0f0;
        }
        
        /* Neo Brutalist Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #fff;
            border-left: 3px solid #000;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffde03;
            border: 3px solid #000;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff0055;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #fff;
            border-left: 3px solid #000;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ffde03;
            border: 3px solid #000;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #ff0055;
        }

        /* Neo Brutalism Utilities */
        .neo-border {
            border: 3px solid #000;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-lg {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow-sm {
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
        }

        /* Rounded Focus */
        *:focus {
            outline: 3px solid #ffde03 !important;
            outline-offset: 2px !important;
            border-radius: 8px;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            animation: marquee 20s linear infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lexend', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        logo: ['Archivo Black', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    },
                    borderRadius: {
                        'neo': '24px',
                        'neo-sm': '12px',
                        'neo-lg': '32px',
                    },
                    colors: {
                        'neo-yellow': '#ffde03',
                        'neo-pink': '#ff0055',
                        'neo-cyan': '#00ffcc',
                        'neo-lime': '#00ff00',
                        'neo-purple': '#9d4edd',
                        'neo-orange': '#ff9100',
                    },
                    boxShadow: {
                        'neo': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'neo-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
                        'neo-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
<body class="bg-[#f0f0f0] transition-colors duration-300 text-black antialiased selection:bg-neo-yellow selection:text-black">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
